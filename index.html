        header {
            background-color: #4a69bd;
            padding: 20px;
            text-align: center;

            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .post-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            background-color: #e8e8e8;
        }
        .post-link h2 {
            margin-bottom: 10px;
            color: #333;
        }
        .post-link p {
            margin-bottom: 20px;
            color: #666;
        }
