<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人代码博客</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="//cdn.bootcss.com/gitalk/1.5.0/gitalk.min.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>我的个人代码博客</h1>
        </header>
        <main>
            <section id="content">
                <!-- 博客内容 -->
                <article class="post">
                    <h2>博客文章标题</h2>
                    <p>博客内容...</p>
                    <pre class="code-block">
                        <code><span class="highlight" data-tooltip="这段很重要">
const example = '代码高亮示例';</span>
console.log(example);
                        </code>
                        <button class="copy-button">复制</button>
                    </pre>
                </article>
            </section>
        </main>
        <div id="gitalk-container"></div>
    </div>
    <script src="/scripts.js"></script>
    <script src="//cdn.bootcss.com/gitalk/1.5.0/gitalk.min.js">
        var gitalk = new Gitalk({
            clientID: '0fa47e71a6a660941186', // GitHub Application Client ID
            clientSecret: '223cf9cbef16c36fa0acb134c67554ca64a15564', // GitHub Application Client Secret
            repo: 'gitalk-comment',      // 存放评论的仓库
            owner: 'qifad',          // 仓库的创建者，
            admin: ['qifad'],        // 如果仓库有多个人可以操作，那么在这里以数组形式写出
            id: location.pathname,      // 用于标记评论是哪个页面的，确保唯一，并且长度小于50
        })

        gitalk.render('gitalk-container');    // 渲染Gitalk评论组件
    </script>
</body>

</html>
